# Alpaca-style instruction template for Supervised Fine-Tuning

template_type: alpaca
system_prompt: "Below is an instruction that describes a task, paired with an input that provides further context. Write a response that appropriately completes the request."

# Template string with {instruction}, {input}, {output} placeholders
prompt_template: |
  {system_prompt}

  ### Instruction:
  {instruction}

  ### Input:
  {input}

  ### Response:
  {output}

# When input is empty, use this template instead
prompt_template_no_input: |
  {system_prompt}

  ### Instruction:
  {instruction}

  ### Response:
  {output}
