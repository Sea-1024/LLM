# Default pretraining hyperparameters
# Suitable for CPU training of a ~25M parameter model

# Data paths (relative to project root)
train_data_path: "data/tokenized/train.bin"
val_data_path: "data/tokenized/val.bin"

# Training steps
max_steps: 10000
batch_size: 8
gradient_accumulation_steps: 4     # effective batch = batch_size * grad_accum = 32

# Optimization
learning_rate: 1.0e-4
min_lr: 1.0e-6                     # minimum LR at end of cosine decay
weight_decay: 0.01
betas: [0.9, 0.999]                # AdamW beta1, beta2
eps: 1.0e-8                         # AdamW epsilon

# LR schedule
warmup_steps: 500

# Gradient clipping
max_grad_norm: 1.0

# Mixed precision (CPU bf16 / CUDA fp16)
use_amp: false                      # set true to enable AMP

# Logging & checkpointing intervals (in steps)
log_interval: 100
eval_interval: 1000
save_interval: 2000

# Output directories
checkpoint_dir: "models/checkpoints"
log_dir: "logs/pretrain"
